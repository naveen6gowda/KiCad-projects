<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="520" fill="#FAFAFA" rx="8"/>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1B4F72">Wall Switch Input Circuit — Per Channel (SW1 for K1 shown)</text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#666">Aqara T1/T2 Style — Low Voltage Switch Detection</text>
  
  <!-- +3V3 Power Rail -->
  <line x1="60" y1="90" x2="60" y2="70" stroke="#E74C3C" stroke-width="2"/>
  <text x="60" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#E74C3C">+3V3</text>
  
  <!-- R_pullup (R14: 10kΩ) -->
  <line x1="60" y1="90" x2="60" y2="110" stroke="#333" stroke-width="1.5"/>
  <rect x="48" y="110" width="24" height="60" fill="#FFF" stroke="#2E75B6" stroke-width="2" rx="3"/>
  <text x="60" y="145" text-anchor="middle" font-size="10" fill="#2E75B6">R14</text>
  <text x="90" y="135" font-size="11" fill="#333" font-weight="bold">10kΩ</text>
  <text x="90" y="150" font-size="9" fill="#888">Pull-up</text>
  <text x="90" y="163" font-size="9" fill="#888">0402 SMD</text>
  <line x1="60" y1="170" x2="60" y2="200" stroke="#333" stroke-width="1.5"/>
  
  <!-- Junction Node -->
  <circle cx="60" cy="200" r="4" fill="#333"/>
  
  <!-- Branch to filter capacitor C7 -->
  <line x1="60" y1="200" x2="60" y2="230" stroke="#333" stroke-width="1.5"/>
  <!-- Capacitor C7 -->
  <line x1="45" y1="230" x2="75" y2="230" stroke="#2E75B6" stroke-width="2.5"/>
  <line x1="45" y1="238" x2="75" y2="238" stroke="#2E75B6" stroke-width="2.5"/>
  <text x="90" y="238" font-size="11" fill="#333" font-weight="bold">C7: 100nF</text>
  <text x="90" y="252" font-size="9" fill="#888">Debounce filter</text>
  <text x="90" y="265" font-size="9" fill="#888">0402 SMD</text>
  <line x1="60" y1="238" x2="60" y2="280" stroke="#333" stroke-width="1.5"/>
  
  <!-- GND symbol for C7 -->
  <line x1="45" y1="280" x2="75" y2="280" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="286" x2="70" y2="286" stroke="#333" stroke-width="1.5"/>
  <line x1="55" y1="292" x2="65" y2="292" stroke="#333" stroke-width="1"/>
  <text x="60" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">GND</text>
  
  <!-- Branch right to series resistor R16 -->
  <line x1="60" y1="200" x2="200" y2="200" stroke="#333" stroke-width="1.5"/>
  
  <!-- R_series (R16: 1kΩ) -->
  <rect x="200" y="188" width="60" height="24" fill="#FFF" stroke="#27AE60" stroke-width="2" rx="3"/>
  <text x="230" y="205" text-anchor="middle" font-size="10" fill="#27AE60">R16</text>
  <text x="230" y="225" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">1kΩ</text>
  <text x="230" y="240" text-anchor="middle" font-size="9" fill="#888">ESD series protect</text>
  <text x="230" y="253" text-anchor="middle" font-size="9" fill="#888">0402 SMD</text>
  
  <!-- Line to ESP32 GPIO -->
  <line x1="260" y1="200" x2="380" y2="200" stroke="#333" stroke-width="1.5"/>
  
  <!-- ESP32-C6 GPIO Box -->
  <rect x="380" y="160" width="160" height="80" fill="#E8F4FD" stroke="#1B4F72" stroke-width="2" rx="6"/>
  <text x="460" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B4F72">XIAO ESP32-C6</text>
  <text x="460" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#E74C3C">D0 (GPIO2)</text>
  <text x="460" y="218" text-anchor="middle" font-size="10" fill="#666">Input — SW1_IN</text>
  <text x="460" y="232" text-anchor="middle" font-size="9" fill="#888">Internal pull-up disabled</text>
  
  <!-- Branch down from junction to switch terminal -->
  <line x1="60" y1="200" x2="60" y2="200" stroke="#333" stroke-width="1.5"/>
  <!-- Left branch down to switch terminal -->
  <line x1="60" y1="200" x2="-10" y2="200" stroke="#333" stroke-width="1.5" stroke-dasharray="none"/>
  
  <!-- Actually, let's draw the switch terminals on the left -->
  <!-- Switch Terminal Block -->
  <rect x="10" y="340" width="100" height="130" fill="#FFF3E0" stroke="#E67E22" stroke-width="2" rx="6"/>
  <text x="60" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#E67E22">J5</text>
  <text x="60" y="376" text-anchor="middle" font-size="10" fill="#333">SW1_INPUT</text>
  <text x="60" y="392" text-anchor="middle" font-size="9" fill="#888">3.5mm Screw</text>
  <text x="60" y="406" text-anchor="middle" font-size="9" fill="#888">Terminal</text>
  
  <!-- Pin 1 (S1) -->
  <circle cx="60" cy="425" r="6" fill="#E67E22" stroke="#333" stroke-width="1"/>
  <text x="60" y="428" text-anchor="middle" font-size="8" fill="white" font-weight="bold">1</text>
  <text x="85" y="428" font-size="10" fill="#333">S1 (signal)</text>
  
  <!-- Pin 2 (GND) -->
  <circle cx="60" cy="450" r="6" fill="#E67E22" stroke="#333" stroke-width="1"/>
  <text x="60" y="453" text-anchor="middle" font-size="8" fill="white" font-weight="bold">2</text>
  <text x="85" y="453" font-size="10" fill="#333">GND (return)</text>
  
  <!-- Wire from J5 Pin 1 to junction -->
  <line x1="60" y1="419" x2="60" y2="320" stroke="#E67E22" stroke-width="2"/>
  <line x1="60" y1="320" x2="-20" y2="320" stroke="#E67E22" stroke-width="2"/>
  <line x1="-20" y1="320" x2="-20" y2="200" stroke="#E67E22" stroke-width="2"/>
  <line x1="-20" y1="200" x2="56" y2="200" stroke="#E67E22" stroke-width="2"/>
  
  <!-- Wire from J5 Pin 2 to GND -->
  <line x1="60" y1="456" x2="60" y2="480" stroke="#333" stroke-width="1.5"/>
  <line x1="45" y1="480" x2="75" y2="480" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="486" x2="70" y2="486" stroke="#333" stroke-width="1.5"/>
  <line x1="55" y1="492" x2="65" y2="492" stroke="#333" stroke-width="1"/>
  <text x="60" y="508" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">GND</text>
  
  <!-- External Wall Switch Symbol -->
  <rect x="180" y="350" width="140" height="90" fill="#F0FFF0" stroke="#27AE60" stroke-width="2" rx="6" stroke-dasharray="5,3"/>
  <text x="250" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#27AE60">External Wall Switch</text>
  <text x="250" y="387" text-anchor="middle" font-size="10" fill="#666">(Rocker or Momentary)</text>
  
  <!-- Switch symbol -->
  <circle cx="210" cy="415" r="3" fill="#333"/>
  <circle cx="280" cy="415" r="3" fill="#333"/>
  <line x1="213" y1="415" x2="270" y2="400" stroke="#333" stroke-width="2"/>
  
  <!-- Lines from switch to terminal -->
  <line x1="180" y1="415" x2="210" y2="415" stroke="#888" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="280" y1="415" x2="320" y2="415" stroke="#888" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="160" y="418" text-anchor="end" font-size="9" fill="#888">to J5-Pin1</text>
  <text x="340" y="418" font-size="9" fill="#888">to J5-Pin2</text>
  
  <!-- Signal flow annotation -->
  <text x="580" y="90" font-size="13" font-weight="bold" fill="#1B4F72">How It Works:</text>
  <text x="580" y="110" font-size="11" fill="#333">1. Switch OPEN → GPIO reads HIGH (3.3V)</text>
  <text x="580" y="128" font-size="11" fill="#333">2. Switch CLOSED → GPIO reads LOW (GND)</text>
  <text x="580" y="146" font-size="11" fill="#333">3. ESP32 detects edge transition</text>
  <text x="580" y="164" font-size="11" fill="#333">4. Firmware toggles relay K1</text>
  <text x="580" y="182" font-size="11" fill="#333">5. C7 provides 50ms debounce</text>
  
  <!-- RC Time Constant -->
  <rect x="580" y="200" width="280" height="70" fill="#FFF8E1" stroke="#F39C12" stroke-width="1" rx="4"/>
  <text x="590" y="220" font-size="11" font-weight="bold" fill="#E67E22">RC Debounce Calculation:</text>
  <text x="590" y="238" font-size="11" fill="#333">τ = R14 × C7 = 10kΩ × 100nF = 1ms</text>
  <text x="590" y="256" font-size="11" fill="#333">Settling time ≈ 5τ = 5ms (hardware)</text>
  <text x="590" y="272" font-size="10" fill="#888">+ 50ms software delay = robust debounce</text>
  
  <!-- Duplicate channel note -->
  <rect x="580" y="290" width="280" height="55" fill="#E8F4FD" stroke="#2E75B6" stroke-width="1" rx="4"/>
  <text x="590" y="310" font-size="11" font-weight="bold" fill="#1B4F72">Channel 2 (SW2 for K2):</text>
  <text x="590" y="328" font-size="11" fill="#333">Identical circuit with R15, R17, C8</text>
  <text x="590" y="346" font-size="10" fill="#333">Connected to D1 (GPIO3) on ESP32-C6</text>
  
  <!-- Safety note -->
  <rect x="580" y="365" width="280" height="80" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1" rx="4"/>
  <text x="590" y="385" font-size="11" font-weight="bold" fill="#E74C3C">⚠ SAFETY:</text>
  <text x="590" y="403" font-size="10" fill="#333">• Switch terminals carry 3.3V ONLY</text>
  <text x="590" y="418" font-size="10" fill="#333">• NO mains voltage on switch wires</text>
  <text x="590" y="433" font-size="10" fill="#333">• Safe for wall switch replacement</text>
  <text x="590" y="448" font-size="10" fill="#333">• Works with rocker AND momentary</text>
  
  <!-- Net labels -->
  <rect x="300" y="185" width="70" height="18" fill="#E8F4FD" stroke="#1B4F72" stroke-width="1" rx="3"/>
  <text x="335" y="198" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B4F72">SW1_IN</text>
</svg>
