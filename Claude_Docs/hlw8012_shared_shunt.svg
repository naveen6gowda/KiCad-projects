<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="'Courier New', monospace">
  <style>
    .wire { stroke: #1a1a1a; stroke-width: 2; fill: none; }
    .wire-hot { stroke: #c0392b; stroke-width: 2.5; fill: none; }
    .wire-gnd { stroke: #2c3e50; stroke-width: 2; fill: none; }
    .wire-fix { stroke: #27ae60; stroke-width: 2.5; fill: none; }
    .wire-load { stroke: #8e44ad; stroke-width: 2.5; fill: none; }
    .wire-signal { stroke: #2980b9; stroke-width: 2; fill: none; }
    .comp { fill: #f9f9f9; stroke: #333; stroke-width: 1.5; }
    .relay-box { fill: #fef9e7; stroke: #d4ac0d; stroke-width: 2; rx: 4; }
    .conn-box { fill: #fdebd0; stroke: #e67e22; stroke-width: 2; rx: 3; }
    .shunt-box { fill: #d5f5e3; stroke: #27ae60; stroke-width: 2.5; }
    .ic { fill: #e8e8e8; stroke: #333; stroke-width: 2; rx: 3; }
    .label { font-size: 11px; fill: #333; font-weight: bold; }
    .value { font-size: 9px; fill: #666; }
    .net { font-size: 12px; fill: #c0392b; font-weight: bold; }
    .pin { font-size: 9px; fill: #555; }
    .title { font-size: 20px; fill: #1a1a1a; font-weight: bold; }
    .subtitle { font-size: 12px; fill: #555; }
    .section { font-size: 13px; fill: #2c3e50; font-weight: bold; }
    .fix-label { font-size: 11px; fill: #27ae60; font-weight: bold; }
    .dot { fill: #1a1a1a; }
    .dot-fix { fill: #27ae60; }
    .gnd-sym { stroke: #2c3e50; stroke-width: 2; fill: none; }
    .arrow { fill: #8e44ad; }
  </style>

  <rect width="1200" height="750" fill="#fefefe"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" class="title">Single Shared Shunt — Combined Current Measurement</text>
  <text x="600" y="55" text-anchor="middle" class="subtitle">RelaySwitch_C6 — R_SHUNT on common L line before both relays</text>

  <!-- ============================================================ -->
  <!-- MAINS INPUT -->
  <!-- ============================================================ -->

  <!-- J1 Connector -->
  <rect x="40" y="180" width="80" height="80" class="conn-box"/>
  <text x="80" y="205" text-anchor="middle" class="label" font-size="12">J1</text>
  <text x="80" y="220" text-anchor="middle" class="value">Mains In</text>
  <text x="80" y="240" text-anchor="middle" class="pin" font-size="10">L (pin 3)</text>
  <text x="80" y="252" text-anchor="middle" class="pin" font-size="10">N (pin 1)</text>

  <!-- F1 Fuse -->
  <line x1="120" y1="200" x2="150" y2="200" class="wire-hot"/>
  <rect x="150" y="193" width="50" height="14" class="comp"/>
  <text x="175" y="204" text-anchor="middle" class="label" font-size="9">F1</text>
  <text x="175" y="218" text-anchor="middle" class="value">Fuse</text>
  <line x1="200" y1="200" x2="240" y2="200" class="wire-hot"/>

  <!-- L net label after fuse -->
  <text x="225" y="193" class="net">L</text>

  <!-- ============================================================ -->
  <!-- HLK-2M05 PSU branch (goes up) -->
  <!-- ============================================================ -->
  <circle cx="240" cy="200" r="3" class="dot"/>
  <line x1="240" y1="200" x2="240" y2="120" class="wire-hot"/>
  <text x="245" y="145" class="pin" font-size="9">to HLK-2M05 (U1)</text>
  <rect x="210" y="90" width="120" height="28" fill="#e8e8e8" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="270" y="108" text-anchor="middle" class="label" font-size="10">U1 — HLK-2M05</text>
  <text x="270" y="80" text-anchor="middle" class="value">→ +5V, +3V3 PSU</text>

  <!-- ============================================================ -->
  <!-- VOLTAGE DIVIDER branch (goes up-right) -->
  <!-- ============================================================ -->
  <circle cx="240" cy="200" r="0"/>
  <line x1="240" y1="200" x2="240" y2="160" class="wire"/>
  <line x1="240" y1="160" x2="400" y2="160" class="wire"/>
  <text x="310" y="155" class="pin" font-size="9">to voltage divider (R4–R13–R9)</text>
  <text x="310" y="145" class="pin" font-size="9">→ V1P (pin 2) for voltage sensing</text>

  <!-- ============================================================ -->
  <!-- ★★★ SHARED SHUNT ON L LINE ★★★ -->
  <!-- ============================================================ -->

  <!-- Highlight box around shunt -->
  <rect x="260" y="175" width="200" height="70" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="360" y="192" text-anchor="middle" class="fix-label" font-size="12">★ SHARED SHUNT ★</text>

  <!-- L line continues to shunt -->
  <line x1="240" y1="200" x2="290" y2="200" class="wire-hot"/>

  <!-- Shunt resistor -->
  <rect x="290" y="193" width="80" height="14" class="shunt-box"/>
  <text x="330" y="204" text-anchor="middle" class="fix-label" font-size="10">R_SHUNT</text>
  <text x="330" y="236" text-anchor="middle" class="fix-label" font-size="10">1mΩ – 10mΩ</text>

  <!-- V2P tap on input side (L side) of shunt -->
  <circle cx="290" cy="200" r="4" class="dot-fix"/>
  <line x1="290" y1="200" x2="290" y2="260" class="wire-fix"/>
  <text x="295" y="255" class="fix-label" font-size="10">V2P (pin 4)</text>

  <!-- GND tap on output side of shunt -->
  <circle cx="370" cy="200" r="4" class="dot-fix"/>
  <line x1="370" y1="200" x2="370" y2="260" class="wire-fix"/>
  <text x="375" y="255" class="fix-label" font-size="10">GND (≈V2N)</text>

  <!-- L_SENSE net after shunt -->
  <line x1="370" y1="200" x2="440" y2="200" class="wire-hot"/>
  <text x="420" y="193" class="net" font-size="10">L_SENSE</text>

  <!-- ============================================================ -->
  <!-- SPLIT TO BOTH RELAYS -->
  <!-- ============================================================ -->

  <!-- Split point -->
  <circle cx="440" cy="200" r="4" class="dot"/>

  <!-- Arrow annotation -->
  <text x="460" y="175" class="section" font-size="11">splits to both relays ↓</text>

  <!-- Branch up to K1 -->
  <line x1="440" y1="200" x2="440" y2="330" class="wire-hot"/>
  <line x1="440" y1="330" x2="530" y2="330" class="wire-hot"/>

  <!-- Branch down to K2 -->
  <line x1="440" y1="200" x2="440" y2="500" class="wire-hot"/>
  <line x1="440" y1="500" x2="530" y2="500" class="wire-hot"/>

  <!-- ============================================================ -->
  <!-- RELAY K1 — CHANNEL 1 -->
  <!-- ============================================================ -->
  <text x="530" y="295" class="section" font-size="12">CHANNEL 1</text>

  <rect x="530" y="305" width="200" height="70" class="relay-box"/>
  <text x="630" y="325" text-anchor="middle" class="label" font-size="12">K1 — G5Q-1-DC5</text>

  <!-- Pin labels -->
  <text x="545" y="345" class="pin" font-size="9">COM (2) ←</text>
  <text x="545" y="362" class="pin" font-size="9">COIL_1/2</text>
  <text x="680" y="345" class="pin" font-size="9" text-anchor="end">→ NO (4)</text>
  <text x="680" y="362" class="pin" font-size="9" text-anchor="end">NC (not used)</text>

  <!-- L_SENSE to COM -->
  <line x1="530" y1="340" x2="530" y2="330" class="wire-hot"/>

  <!-- NO to LOAD_CH1 -->
  <line x1="730" y1="340" x2="850" y2="340" class="wire-load"/>

  <!-- Load connector J3 -->
  <rect x="850" y="320" width="130" height="55" class="conn-box"/>
  <text x="915" y="340" text-anchor="middle" class="label" font-size="11">J3 — LOAD_CH1</text>
  <text x="915" y="358" text-anchor="middle" class="pin" font-size="9">pin 1: Load out</text>
  <text x="915" y="370" text-anchor="middle" class="pin" font-size="9">pin 2: MAINS_N</text>

  <!-- N line to J3 -->
  <line x1="120" y1="365" x2="850" y2="365" class="wire" stroke-dasharray="4,2" opacity="0.4"/>
  <text x="500" y="380" class="pin" font-size="8" opacity="0.5">MAINS_N</text>

  <!-- Current flow arrow CH1 -->
  <polygon points="790,330 810,340 790,350" class="arrow" opacity="0.6"/>

  <!-- ============================================================ -->
  <!-- RELAY K2 — CHANNEL 2 -->
  <!-- ============================================================ -->
  <text x="530" y="465" class="section" font-size="12">CHANNEL 2</text>

  <rect x="530" y="475" width="200" height="70" class="relay-box"/>
  <text x="630" y="495" text-anchor="middle" class="label" font-size="12">K2 — G5Q-1-DC5</text>

  <text x="545" y="515" class="pin" font-size="9">COM (2) ←</text>
  <text x="545" y="532" class="pin" font-size="9">COIL_1/2</text>
  <text x="680" y="515" class="pin" font-size="9" text-anchor="end">→ NO (4)</text>
  <text x="680" y="532" class="pin" font-size="9" text-anchor="end">NC (not used)</text>

  <!-- L_SENSE to COM -->
  <line x1="530" y1="510" x2="530" y2="500" class="wire-hot"/>

  <!-- NO to LOAD_CH2 -->
  <line x1="730" y1="510" x2="850" y2="510" class="wire-load"/>

  <!-- Load connector J4 -->
  <rect x="850" y="490" width="130" height="55" class="conn-box"/>
  <text x="915" y="510" text-anchor="middle" class="label" font-size="11">J4 — LOAD_CH2</text>
  <text x="915" y="528" text-anchor="middle" class="pin" font-size="9">pin 1: Load out</text>
  <text x="915" y="540" text-anchor="middle" class="pin" font-size="9">pin 2: MAINS_N</text>

  <!-- N line to J4 -->
  <line x1="120" y1="535" x2="850" y2="535" class="wire" stroke-dasharray="4,2" opacity="0.4"/>
  <text x="500" y="550" class="pin" font-size="8" opacity="0.5">MAINS_N</text>

  <!-- Current flow arrow CH2 -->
  <polygon points="790,500 810,510 790,520" class="arrow" opacity="0.6"/>

  <!-- ============================================================ -->
  <!-- HLW8012 (simplified) -->
  <!-- ============================================================ -->
  <rect x="100" y="280" width="160" height="130" class="ic"/>
  <text x="180" y="305" text-anchor="middle" class="label" font-size="12">HLW8012 (U5)</text>

  <text x="115" y="330" class="pin" font-size="9">VDD  1</text>
  <text x="115" y="350" class="pin" font-size="9">V1P  2</text>
  <text x="115" y="370" class="pin" font-size="9">V1N  3</text>
  <text x="115" y="390" class="pin" font-size="9">V2P  4</text>

  <text x="210" y="330" class="pin" font-size="9" text-anchor="end">5 GND</text>
  <text x="210" y="350" class="pin" font-size="9" text-anchor="end">6 CF</text>
  <text x="210" y="370" class="pin" font-size="9" text-anchor="end">7 CF1</text>
  <text x="210" y="390" class="pin" font-size="9" text-anchor="end">8 SEL</text>

  <!-- V2P connection from shunt -->
  <line x1="100" y1="387" x2="60" y2="387" class="wire-fix"/>
  <line x1="60" y1="387" x2="60" y2="270" class="wire-fix"/>
  <line x1="60" y1="270" x2="290" y2="270" class="wire-fix"/>
  <line x1="290" y1="260" x2="290" y2="270" class="wire-fix"/>
  <text x="70" y="320" class="fix-label" font-size="9">V2P</text>

  <!-- V1P from divider -->
  <line x1="100" y1="347" x2="70" y2="347" class="wire-signal"/>
  <text x="40" y="350" class="pin" font-size="8">divider</text>

  <!-- V1N to GND -->
  <line x1="100" y1="367" x2="80" y2="367" class="wire-gnd"/>
  <text x="55" y="370" class="pin" font-size="8">GND</text>

  <!-- CF/CF1/SEL to MCU -->
  <line x1="260" y1="347" x2="330" y2="347" class="wire-signal"/>
  <line x1="260" y1="367" x2="330" y2="367" class="wire-signal"/>
  <line x1="260" y1="387" x2="330" y2="387" class="wire-signal"/>
  <text x="310" y="342" class="pin" font-size="8">GPIO20</text>
  <text x="310" y="362" class="pin" font-size="8">GPIO21</text>
  <text x="310" y="382" class="pin" font-size="8">GPIO22</text>

  <!-- ============================================================ -->
  <!-- CURRENT FLOW EXPLANATION -->
  <!-- ============================================================ -->
  <rect x="40" y="590" width="1120" height="140" fill="#eafaf1" stroke="#27ae60" stroke-width="2" rx="6"/>
  <text x="60" y="618" class="fix-label" font-size="14">How It Works:</text>

  <text x="60" y="645" class="label" font-size="11">Current path:  J1(L) → F1 → R_SHUNT → split → K1 COM→NO → J3 (Load CH1)</text>
  <text x="60" y="665" class="label" font-size="11">                                          → K2 COM→NO → J4 (Load CH2)</text>

  <text x="60" y="695" class="fix-label" font-size="11">V2P measures total voltage drop across R_SHUNT = (I_CH1 + I_CH2) × R_SHUNT</text>
  <text x="60" y="715" class="value" font-size="11">Combined power = V_rms × I_total.  You get total consumption of both channels together.</text>

  <!-- ============================================================ -->
  <!-- Legend bar -->
  <!-- ============================================================ -->
  <rect x="40" y="60" width="1120" height="25" fill="#f5f5f5" stroke="#ccc" rx="3"/>
  <line x1="60" y1="73" x2="90" y2="73" class="wire-hot"/>
  <text x="95" y="77" class="value" font-size="9">L (Live)</text>
  <line x1="170" y1="73" x2="200" y2="73" class="wire-fix"/>
  <text x="205" y="77" class="fix-label" font-size="9">V2P sense</text>
  <line x1="290" y1="73" x2="320" y2="73" class="wire-load"/>
  <text x="325" y="77" class="value" font-size="9">Load path</text>
  <line x1="410" y1="73" x2="440" y2="73" class="wire-signal"/>
  <text x="445" y="77" class="value" font-size="9">Signal</text>
  <line x1="510" y1="73" x2="540" y2="73" class="wire" stroke-dasharray="4,2" opacity="0.4"/>
  <text x="545" y="77" class="value" font-size="9">Neutral</text>

</svg>
